<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta name="description"
        content="Portfolio of Ian Hafiz Bin Syahrul Azlan — software engineer and developer. Projects, experience, and contact details." />
    <meta name="keywords" content="Ian Hafiz, portfolio, software engineer, developer, projects, resume, CV" />
    <meta name="author" content="Ian Hafiz Bin Syahrul Azlan" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://ian-portfolio-tau.vercel.app/" />

    <!-- Preconnect for Google Fonts used by the site -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Open Graph -->
    <meta property="og:title" content="Ian Hafiz — Portfolio" />
    <meta property="og:description"
        content="Software engineer showcasing selected projects, skills, and contact information." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://ian-portfolio-tau.vercel.app/" />
    <meta property="og:image" content="https://ian-portfolio-tau.vercel.app/img/mario-bg.webp" />
    <meta property="og:image:alt" content="Retro Mario-themed portfolio background" />
    <meta property="og:site_name" content="Ian Hafiz Portfolio" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Ian Hafiz — Portfolio" />
    <meta name="twitter:description"
        content="Software engineer showcasing selected projects, skills, and contact information." />
    <meta name="twitter:image" content="https://ian-portfolio-tau.vercel.app/img/mario-bg.webp" />

    <!-- Discovery -->
    <link rel="sitemap" type="application/xml" href="/sitemap.xml" />
    <!--
  manifest.json provides metadata used when your web app is installed on a
  user's mobile device or desktop. See https://developers.google.com/web/fundamentals/web-app-manifest/
-->
    <!--
  Notice the use of %PUBLIC_URL% in the tags above.
  It will be replaced with the URL of the `public` folder during the build.
  Only files inside the `public` folder can be referenced from the HTML.

  Unlike "/favicon.ico" or "favicon.ico", "%PUBLIC_URL%/favicon.ico" will
  work correctly both with client-side routing and a non-root public URL.
  Learn how to configure a non-root public URL by running `npm run build`.
-->
    <link rel="icon" type="image/svg+xml" href="%PUBLIC_URL%/favicon.svg" />
    <title>Ian Hafiz — Mario Portfolio</title>

</head>

<body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
</body>

</html>
